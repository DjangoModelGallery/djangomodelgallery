name: Use repository files in GitHub Actions

on:
  push:
    paths:
      - '**.md' # Markdown 파일이 변경될 때만 실행

jobs:
  upload-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      
    - name: List files
      run: ls
      
    - name: Run Python script from repository
      run: python src/scripts/update_json.py # 필요한 파일을 사용하여 원하는 작업 실행

    - name: Commit artifact
      run: |
        git config --local user.email "${{ secrets.SHEMAIL }}"
        git config --local user.name "${{ secrets.SHNICK }}"
        git add example.md
        git commit -m "자동업데이트"
        git push https://${{ secrets.SHTOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}